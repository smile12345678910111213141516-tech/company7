<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Repowering Partners</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="starfield">
    <div class="stars" aria-hidden="true"></div>
  </div>

  <header class="navbar">
    <a href="index.html" class="navbar__brand">
      <img src="favicon.svg" alt="" class="navbar__logo" width="24" height="24" />
      Repowering <span>Partners</span>
    </a>
    <button class="navbar__toggle" type="button" aria-label="Toggle navigation">
      <span class="navbar__toggle-bar"></span>
      <span class="navbar__toggle-bar"></span>
      <span class="navbar__toggle-bar"></span>
    </button>
    <nav class="navbar__nav" id="main-nav">
      <ul class="navbar__links">
        <li><a href="index.html">Product</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="container">
        <span class="hero__badge animate-in">Get in touch</span>
        <h1 class="hero__title animate-in animate-in--delay-1">Contact <span>Repowering Partners</span></h1>
        <p class="hero__subtitle animate-in animate-in--delay-2">
          Interested in solar farm acquisition, partnership, or learning more? Send us a message.
        </p>
      </div>
    </section>

    <section class="section">
      <div class="container" style="max-width: 600px;">
        <div class="card" style="padding: 2.5rem;">
          <form action="#" method="post" id="contact-form">
            <div class="form-group">
              <label for="name">Name</label>
              <input type="text" id="name" name="name" required placeholder="Your name" />
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" required placeholder="you@example.com" />
            </div>
            <div class="form-group">
              <label for="message">Message</label>
              <textarea id="message" name="message" required rows="5" placeholder="Tell us about your goals..."></textarea>
            </div>
            <button type="submit" class="btn btn--primary" style="width: 100%;">Send message</button>
          </form>

          <div style="margin-top: 2rem; text-align: center; color: var(--text-muted); font-size: 0.9rem;">
            <p><strong>Email:</strong> <a href="mailto:Jim.bakhaus@repoweringpartners.com" style="color:var(--accent-teal-bright); text-decoration:none;">Jim.bakhaus@repoweringpartners.com</a></p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; Repowering Partners. All rights reserved. <a href="contact.html">Contact</a> | <a href="about.html">About</a></p>
    </div>
  </footer>

  <script src="js/stars.js" defer></script>
  <script src="js/main.js" defer></script>
  <script>
    document.getElementById('contact-form').addEventListener('submit', function (e) {
      e.preventDefault();
      alert('Thank you for your message. We\'ll be in touch soon.');
      this.reset();
    });
  </script>
</body>
</html>
